sources:
  my-bigquery-source:
    kind: "bigquery"
    project: "modified-alloy-483408-q0"
    # location: "US" # Optional: Specifies the location for query jobs.
    writeMode: "blocked" # One of: allowed, blocked, protected. Defaults to "allowed".
    # allowedDatasets: # Optional: Restricts tool access to a specific list of datasets.
    #   - "my_dataset_1" 
    #   - "other_project.my_dataset_2"
    # impersonateServiceAccount: "service-account@project-id.iam.gserviceaccount.com" # Optional: Service account to impersonate
    # scopes: # Optional: List of OAuth scopes to request.
    #   - "https://www.googleapis.com/auth/bigquery"
    #   - "https://www.googleapis.com/auth/drive.readonly"
    # maxQueryResultRows: 50 # Optional: Limits the number of rows returned by queries. Defaults to 50.


tools:

  list_crimes_by_year:
    kind: bigquery-sql
    source: my-bigquery-source
    description: List crime records for a given year.

    parameters:
      - name: year
        type: integer
        description: Year of crime (e.g. 2022)

    statement: |
      SELECT
        unique_key,
        primary_type,
        description,
        address,
        district,
        zipcode,
        timestamp
      FROM `modified-alloy-483408-q0.austin_crime_data_1.austin_data`
      WHERE year = @year
      ORDER BY timestamp desc
      LIMIT 100


  crimes_by_month:
    kind: bigquery-sql
    source: my-bigquery-source
    description: Monthly crime trend for a given year.

    parameters:
      - name: year
        type: integer
        description: Year of crime (e.g. 2022)

    statement: |
      SELECT
        EXTRACT(MONTH FROM timestamp) AS month,
        COUNT(*) AS total
      FROM `modified-alloy-483408-q0.austin_crime_data_1.austin_data`
      WHERE year = @year
      GROUP BY month
      ORDER BY month


  recent_crimes:
    kind: bigquery-sql
    source: my-bigquery-source
    description: Fetch most recent crime incidents.

    parameters:
      - name: limit
        type: integer
        description: Maximum number of records to return

    statement: |
      SELECT
        unique_key,
        primary_type,
        description,
        address,
        district,
        timestamp
      FROM `modified-alloy-483408-q0.austin_crime_data_1.austin_data`
      ORDER BY timestamp desc
      LIMIT @limit


  get_table_schema:
    kind: bigquery-sql
    source: my-bigquery-source
    description: Retrieve schema information for the Austin crime table.

    parameters:
      - name: dummy
        type: string
        description: Required placeholder parameter. Value is ignored.

    statement: |
      SELECT
        column_name,
        data_type,
        is_nullable
      FROM `modified-alloy-483408-q0.austin_crime_data_1.INFORMATION_SCHEMA.COLUMNS`
      WHERE table_name = 'austin_data'
      ORDER BY ordinal_position
  list_datasets:
    kind: bigquery-list-dataset-ids
    source: my-bigquery-source
    description: List all available datasets.



  list_tables:
    kind: bigquery-list-table-ids
    source: my-bigquery-source
    description: List tables in a dataset.



  get_table_info:
    kind: bigquery-get-table-info
    source: my-bigquery-source
    description: Get metadata for a table.


  search_catalog:
    kind: bigquery-search-catalog
    source: my-bigquery-source
    description: Search Dataplex catalog.

  run_sql:
    kind: bigquery-execute-sql
    source: my-bigquery-source
    description: Run ad-hoc SQL queries generated by the LLM.

    